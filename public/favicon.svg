<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Green rounded square background -->
  <rect width="200" height="200" rx="44" fill="#4CAF50"/>

  <!-- Truck/shipping icon adapted from official logo paths, white -->
  <!-- Truck body -->
  <path fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"
    d="M 60 130 L 60 75 L 130 75 L 148 100 L 148 130"/>
  <!-- Truck cab roof line -->
  <path fill="none" stroke="white" stroke-width="8" stroke-linecap="round"
    d="M 130 75 L 130 130"/>
  <!-- Horizontal lines (load bars from official logo) -->
  <path fill="none" stroke="white" stroke-width="6" stroke-linecap="round"
    d="M 52 96 L 104 96"/>
  <path fill="none" stroke="white" stroke-width="6" stroke-linecap="round"
    d="M 52 108 L 108 108"/>
  <path fill="none" stroke="white" stroke-width="6" stroke-linecap="round"
    d="M 52 120 L 112 120"/>
  <!-- Cargo rectangle on cab -->
  <path fill="none" stroke="white" stroke-width="6" stroke-linecap="round"
    d="M 133 88 L 145 88"/>
  <!-- Left wheel -->
  <circle cx="82" cy="138" r="12" fill="none" stroke="white" stroke-width="8"/>
  <!-- Right wheel -->
  <circle cx="136" cy="138" r="12" fill="none" stroke="white" stroke-width="8"/>
</svg>
